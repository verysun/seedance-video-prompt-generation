version: '3.8'

services:
  app:
    build: .
    image: short-video-prompt-generation:latest
    container_name: video-prompt-generator
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      # - OPENAI_API_KEY=your-api-key # Configure your environments here
    restart: always
